# .github/workflows/visual-regression.yml
# VR runs only via scripts/vr-docker.mjs (Playwright official image) — same path as yarn test:vr.
name: Visual Regression

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline snapshots and commit them'
        type: boolean
        default: false

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  visual-regression:
    name: Visual Regression (Docker / Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update baseline snapshots
        if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots == true
        run: node scripts/vr-docker.mjs update

      - name: Commit updated snapshots
        if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/
          git diff --cached --quiet || git commit -m "chore(vr): update visual baselines (Docker/Chromium) [skip ci]"
          git push

      - name: Run visual regression tests
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.update_snapshots != true)
        run: node scripts/vr-docker.mjs test
        continue-on-error: true
        id: visual

      - name: Upload diff images
        if: (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.update_snapshots != true)) && steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs-chromium
          path: test-results/
          retention-days: 14

      - name: Upload Playwright HTML report
        if: inputs.update_snapshots != true && steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-vr-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      # TODO: re-enable once Docker VR tests are fixed (WordSpell/NumberMatch timeout in CI)
      # - name: Fail if visual regressions found
      #   if: (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.update_snapshots != true)) && steps.visual.outcome == 'failure'
      #   run: exit 1
