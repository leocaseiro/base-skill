# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-flight deploy

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          # Use a PAT so the release branch/tag push is attributed to a real
          # user. Pushes made with the default GITHUB_TOKEN do NOT trigger
          # downstream workflows (prevents recursion), which means CI checks
          # never run on the auto-generated release PR. Falls back to
          # GITHUB_TOKEN locally / in forks where RELEASE_PAT isn't set.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Determine and apply version bump
        id: bump
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUMP=$(bash scripts/determine-bump.sh "$PR_NUMBER")
          echo "Detected bump type: $BUMP"
          if [[ "$BUMP" == "skip" ]]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$BUMP" in
            major|minor|patch) ;;
            *)
              echo "Unexpected bump value: $BUMP" >&2
              exit 1
              ;;
          esac
          yarn version --"$BUMP" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build
        run: yarn build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ONEDRIVE_CLIENT_ID: ${{ secrets.VITE_ONEDRIVE_CLIENT_ID }}
          VITE_CF_WORKER_URL: ${{ secrets.VITE_CF_WORKER_URL }}
          VITE_ANALYTICS_PROVIDER: ${{ vars.VITE_ANALYTICS_PROVIDER }}

      - name: Copy shell to index.html
        run: cp dist/client/_shell.html dist/client/index.html

      - name: SPA fallback for GitHub Pages (history routing)
        run: cp dist/client/index.html dist/client/404.html

      - name: Build Storybook
        run: yarn build-storybook --output-dir storybook-static

      - name: Merge Storybook into dist
        run: mkdir -p dist/client/docs && cp -r storybook-static/. dist/client/docs

      - name: Stamp version.json
        run: |
          set -euo pipefail
          BUILD_SHA=$(git rev-parse HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > dist/client/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "buildSha": "${BUILD_SHA}",
            "buildDate": "${BUILD_DATE}"
          }
          EOF

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/client
          clean: true
          clean-exclude: |
            pr/**
          commit-message: 'deploy: production ${{ steps.version.outputs.version }}'

      - name: Open release PR for version bump
        # Master is protected by a ruleset requiring PRs, so the bot cannot
        # push the chore(release) commit directly. Instead we land the
        # package.json bump via a PR and push the tag separately (tags are
        # not covered by the branch ruleset).
        if: steps.bump.outputs.bumped == 'true' && github.actor != 'github-actions[bot]'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          # PAT required so the created PR triggers CI checks. With the default
          # GITHUB_TOKEN, PRs open but no workflows run on them.
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # Bypass the local pre-push quality gate — every check in the hook
          # (lint, typecheck, unit, storybook, VR, e2e) already ran in ci.yml
          # on the merging PR. The runner also uses dash as /bin/sh, which
          # chokes on the hook's bash-isms further down the script.
          SKIP_PREPUSH: 1
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="release/v${NEW_VERSION}"
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin "$BRANCH" --follow-tags
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore(release): v${NEW_VERSION}" \
            --body "Automated version bump from the deploy workflow.

          The site has already been deployed to gh-pages with version \`${NEW_VERSION}\` (see \`dist/client/version.json\`). Merging this PR lands the matching \`package.json\` bump on master and makes the \`v${NEW_VERSION}\` tag reachable from master.

          The bump type was derived from the merged PR's conventional-commit messages by \`scripts/determine-bump.sh\`."
          # Enable auto-merge so the release PR lands the moment required
          # checks go green — no human review needed for version bumps.
          gh pr merge "$BRANCH" --auto --squash --delete-branch
