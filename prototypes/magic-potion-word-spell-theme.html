<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Magic Potion — WordSpell Theme Prototype</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        background: radial-gradient(ellipse at 50% 20%, #1a0a3e, #0a0618);
        font-family:
          'Segoe UI',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: #e8d5ff;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Starfield ── */
      .starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle var(--dur) ease-in-out infinite alternate;
      }
      @keyframes twinkle {
        0% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1.4);
        }
      }

      /* ── Floating sparkle particles ── */
      .ambient-sparkle {
        position: fixed;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 1;
        animation: floatSparkle var(--dur) ease-in-out infinite;
      }
      @keyframes floatSparkle {
        0%,
        100% {
          opacity: 0;
          transform: translateY(0) scale(0.5);
        }
        50% {
          opacity: 0.8;
          transform: translateY(-40px) scale(1.2);
        }
      }

      /* ── HUD ── */
      .hud {
        position: relative;
        z-index: 50;
        display: flex;
        gap: 16px;
        align-items: center;
        margin-top: 12px;
        background: rgba(20, 8, 50, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 8px 24px;
        border: 1px solid rgba(180, 130, 255, 0.3);
        box-shadow: 0 0 20px rgba(120, 60, 220, 0.3);
      }
      .hud-emoji {
        font-size: 32px;
        line-height: 1;
      }
      .hud-progress {
        font-size: 14px;
        font-weight: 700;
        color: #c4a6ff;
      }
      .hud-word-num {
        font-size: 13px;
        color: #9a7fd4;
      }

      /* ── Spell scroll ── */
      .scroll-area {
        position: relative;
        z-index: 50;
        margin-top: 10px;
      }
      .spell-scroll {
        background: linear-gradient(
          180deg,
          #f5e6c8 0%,
          #e8d4a8 40%,
          #d4bf8a 100%
        );
        border-radius: 12px;
        padding: 14px 28px;
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        box-shadow:
          0 4px 20px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
        border: 2px solid #a08050;
        position: relative;
        min-height: 64px;
      }
      .spell-scroll::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 10%;
        right: 10%;
        height: 16px;
        background: linear-gradient(180deg, #c4a870, #d4bf8a);
        border-radius: 8px 8px 0 0;
        border: 2px solid #a08050;
        border-bottom: none;
      }
      .spell-scroll::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 10%;
        right: 10%;
        height: 16px;
        background: linear-gradient(0deg, #c4a870, #d4bf8a);
        border-radius: 0 0 8px 8px;
        border: 2px solid #a08050;
        border-top: none;
      }
      .letter-slot {
        width: 44px;
        height: 50px;
        border: 2px dashed #8a6a3a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 800;
        color: #4a2a0a;
        background: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        transition: all 0.3s;
        position: relative;
        z-index: 2;
      }
      .letter-slot.filled {
        border-style: solid;
        border-color: #6a4a1a;
        background: rgba(255, 255, 255, 0.6);
        box-shadow: 0 0 12px rgba(180, 140, 60, 0.5);
      }

      /* ── Cauldron scene ── */
      .cauldron-scene {
        position: relative;
        z-index: 40;
        margin-top: 8px;
        width: 280px;
        height: 220px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }

      /* Cauldron body */
      .cauldron {
        position: relative;
        width: 200px;
        height: 140px;
      }
      .cauldron-pot {
        position: absolute;
        bottom: 30px;
        left: 10px;
        right: 10px;
        height: 100px;
        background: linear-gradient(
          180deg,
          #3a3a4a,
          #1a1a2a 40%,
          #0a0a15 100%
        );
        border-radius: 0 0 50% 50% / 0 0 60% 60%;
        border: 3px solid #555;
        border-top: 4px solid #666;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.8),
          inset 0 -10px 20px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      /* Rim */
      .cauldron-rim {
        position: absolute;
        bottom: 120px;
        left: 2px;
        right: 2px;
        height: 18px;
        background: linear-gradient(180deg, #777, #555, #444);
        border-radius: 50%;
        border: 2px solid #888;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        z-index: 2;
      }
      /* Legs */
      .cauldron-leg {
        position: absolute;
        bottom: 0;
        width: 12px;
        height: 36px;
        background: linear-gradient(90deg, #444, #666, #444);
        border-radius: 0 0 4px 4px;
      }
      .cauldron-leg.left {
        left: 30px;
        transform: rotate(-8deg);
      }
      .cauldron-leg.center {
        left: 50%;
        transform: translateX(-50%);
      }
      .cauldron-leg.right {
        right: 30px;
        transform: rotate(8deg);
      }

      /* Potion liquid */
      .potion-surface {
        position: absolute;
        bottom: 58px;
        left: 20px;
        right: 20px;
        height: 50px;
        border-radius: 50%;
        z-index: 3;
        transition: background 0.8s ease;
        box-shadow: 0 0 30px var(--potion-glow, rgba(128, 0, 255, 0.6));
      }
      .potion-surface::after {
        content: '';
        position: absolute;
        top: 10px;
        left: 20%;
        width: 60%;
        height: 15px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        filter: blur(4px);
      }

      /* Bubbles rising from potion */
      .potion-bubble {
        position: absolute;
        border-radius: 50%;
        z-index: 4;
        pointer-events: none;
        animation: bubbleRise var(--dur) ease-in infinite;
        animation-delay: var(--delay);
        opacity: 0;
      }
      @keyframes bubbleRise {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0.5);
        }
        10% {
          opacity: 0.7;
        }
        80% {
          opacity: 0.4;
        }
        100% {
          opacity: 0;
          transform: translateY(-80px) scale(1.2);
        }
      }

      /* Cauldron drop zone highlight */
      .cauldron-scene.drop-hover .potion-surface {
        box-shadow: 0 0 50px var(--potion-glow, rgba(128, 0, 255, 0.9));
      }

      /* ── Letter orbs (tile bank) ── */
      .orb-bank {
        position: relative;
        z-index: 45;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        padding: 12px 20px;
        margin-top: 12px;
        max-width: 380px;
      }
      .letter-orb {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        cursor: grab;
        position: relative;
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        background: radial-gradient(
          circle at 35% 35%,
          rgba(200, 160, 255, 0.9),
          rgba(100, 50, 180, 0.8) 60%,
          rgba(60, 20, 120, 0.9)
        );
        border: 2px solid rgba(200, 170, 255, 0.6);
        box-shadow:
          0 0 15px rgba(150, 100, 255, 0.5),
          0 0 30px rgba(120, 60, 220, 0.3),
          inset 0 -3px 6px rgba(0, 0, 0, 0.3),
          inset 0 2px 4px rgba(255, 255, 255, 0.2);
        animation: orbFloat var(--float-dur, 3s) ease-in-out infinite alternate;
        animation-delay: var(--float-delay, 0s);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        touch-action: none;
      }
      .letter-orb::after {
        content: '';
        position: absolute;
        top: 8px;
        left: 12px;
        width: 12px;
        height: 8px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
        transform: rotate(-20deg);
      }
      @keyframes orbFloat {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-6px);
        }
      }
      .letter-orb:active {
        cursor: grabbing;
      }
      .letter-orb.dragging {
        opacity: 0.6;
        transform: scale(0.85);
        box-shadow: 0 0 8px rgba(150, 100, 255, 0.3);
        animation: none;
      }
      .letter-orb.used {
        opacity: 0;
        pointer-events: none;
        transform: scale(0);
        transition: all 0.4s ease-in;
      }

      /* Drag ghost (the orb being dragged) */
      .drag-ghost {
        position: fixed;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
        background: radial-gradient(
          circle at 35% 35%,
          rgba(220, 180, 255, 1),
          rgba(130, 70, 220, 0.95) 60%,
          rgba(80, 30, 160, 1)
        );
        border: 2px solid rgba(220, 190, 255, 0.8);
        box-shadow:
          0 0 25px rgba(170, 120, 255, 0.8),
          0 0 50px rgba(130, 70, 220, 0.5);
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%) scale(1.15);
        transition: none;
      }
      .drag-ghost::after {
        content: '';
        position: absolute;
        top: 8px;
        left: 12px;
        width: 12px;
        height: 8px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transform: rotate(-20deg);
      }

      /* ── Splash effect ── */
      .splash-particle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 60;
        animation: splashOut 0.6s ease-out forwards;
      }
      @keyframes splashOut {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--sx), var(--sy)) scale(0.3);
        }
      }

      /* ── Sparkle burst ── */
      .sparkle-particle {
        position: absolute;
        pointer-events: none;
        z-index: 60;
        animation: sparkleBurst 0.8s ease-out forwards;
      }
      @keyframes sparkleBurst {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--sx), var(--sy)) scale(0);
        }
      }

      /* ── Smoke puff ── */
      .smoke-puff {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        z-index: 55;
        animation: smokePuff 1s ease-out forwards;
      }
      @keyframes smokePuff {
        0% {
          opacity: 0.7;
          transform: translate(0, 0) scale(0.5);
        }
        100% {
          opacity: 0;
          transform: translate(var(--sx), var(--sy)) scale(2.5);
        }
      }

      /* ── Completion eruption ── */
      .eruption-particle {
        position: fixed;
        pointer-events: none;
        z-index: 200;
        animation: erupt var(--dur) ease-out forwards;
      }
      @keyframes erupt {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        60% {
          opacity: 0.9;
        }
        100% {
          opacity: 0;
          transform: translate(var(--ex), var(--ey)) scale(var(--es, 0.2));
        }
      }

      /* ── Materialised creature ── */
      .materialised {
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 80px;
        z-index: 210;
        animation: materialise 1.2s 0.4s ease-out forwards;
        filter: drop-shadow(0 0 30px rgba(255, 220, 100, 0.8));
      }
      @keyframes materialise {
        0% {
          transform: translate(-50%, -50%) scale(0) rotate(-20deg);
          opacity: 0;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.3) rotate(5deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      /* ── Celebration text ── */
      .celebration-text {
        position: fixed;
        top: 48%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 28px;
        font-weight: 900;
        color: #ffd700;
        text-shadow:
          0 0 20px rgba(255, 215, 0, 0.8),
          0 2px 4px rgba(0, 0, 0, 0.5);
        z-index: 210;
        animation: celebText 1s 0.8s ease-out forwards;
        white-space: nowrap;
      }
      @keyframes celebText {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 0;
        }
        60% {
          transform: translate(-50%, -50%) scale(1.2);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      /* ── Next word button ── */
      .next-btn {
        position: fixed;
        bottom: 12%;
        left: 50%;
        transform: translateX(-50%) scale(0);
        z-index: 220;
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        color: white;
        font-size: 20px;
        font-weight: 800;
        padding: 14px 36px;
        border: 2px solid rgba(200, 170, 255, 0.6);
        border-radius: 30px;
        cursor: pointer;
        box-shadow:
          0 0 20px rgba(139, 92, 246, 0.5),
          0 4px 15px rgba(0, 0, 0, 0.4);
        animation: nextAppear 0.5s 1.5s ease-out forwards;
      }
      @keyframes nextAppear {
        0% {
          transform: translateX(-50%) scale(0);
        }
        70% {
          transform: translateX(-50%) scale(1.1);
        }
        100% {
          transform: translateX(-50%) scale(1);
        }
      }
      .next-btn:hover {
        background: linear-gradient(135deg, #a78bfa, #7c3aed);
      }

      /* ── Complete screen overlay ── */
      .complete-overlay {
        position: fixed;
        inset: 0;
        z-index: 190;
        background: rgba(10, 4, 30, 0.7);
        pointer-events: none;
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>

    <!-- HUD -->
    <div class="hud" id="hud">
      <span class="hud-emoji" id="hudEmoji"></span>
      <span class="hud-progress" id="hudProgress"></span>
      <span class="hud-word-num" id="hudWordNum"></span>
    </div>

    <!-- Spell scroll -->
    <div class="scroll-area">
      <div class="spell-scroll" id="spellScroll"></div>
    </div>

    <!-- Cauldron scene -->
    <div class="cauldron-scene" id="cauldronScene">
      <div class="cauldron" id="cauldron">
        <div class="cauldron-rim"></div>
        <div class="cauldron-pot" id="cauldronPot">
          <div
            class="potion-surface"
            id="potionSurface"
          ></div>
        </div>
        <div class="cauldron-leg left"></div>
        <div class="cauldron-leg center"></div>
        <div class="cauldron-leg right"></div>
      </div>
    </div>

    <!-- Orb bank -->
    <div class="orb-bank" id="orbBank"></div>

    <script>
      /* ─────────────────────────────────────────────
         Game data
      ───────────────────────────────────────────── */
      const WORDS = [
        { emoji: '\u{1F431}', word: 'cat' },
        { emoji: '\u{1F436}', word: 'dog' },
        { emoji: '\u{1F438}', word: 'frog' },
        { emoji: '\u{1F31F}', word: 'star' },
        { emoji: '\u{1F41D}', word: 'bee' },
      ];

      const POTION_COLOURS = [
        { bg: 'radial-gradient(ellipse, #9040e0, #5a1aaa)', glow: 'rgba(128,0,255,0.6)' },
        { bg: 'radial-gradient(ellipse, #5060e8, #2a30b0)', glow: 'rgba(60,80,255,0.6)' },
        { bg: 'radial-gradient(ellipse, #30a0c0, #1a6888)', glow: 'rgba(40,180,200,0.6)' },
        { bg: 'radial-gradient(ellipse, #30b868, #1a8040)', glow: 'rgba(40,200,100,0.6)' },
        { bg: 'radial-gradient(ellipse, #d4aa20, #a08010)', glow: 'rgba(220,180,30,0.7)' },
      ];

      const ALPHABET = 'abcdefghijklmnopqrstuvwxyz';
      const EXTRA_DISTRACTORS = 4;

      let wordIndex = 0;
      let currentWord = '';
      let currentEmoji = '';
      let nextLetterIdx = 0;
      let letterSlots = [];
      let isComplete = false;

      /* ─────────────────────────────────────────────
         Starfield + ambient sparkles
      ───────────────────────────────────────────── */
      function buildStarfield() {
        const sf = document.getElementById('starfield');
        sf.innerHTML = '';
        for (let i = 0; i < 80; i++) {
          const s = document.createElement('div');
          s.className = 'star';
          s.style.left = Math.random() * 100 + '%';
          s.style.top = Math.random() * 100 + '%';
          s.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
          s.style.animationDelay = (Math.random() * 3) + 's';
          const size = 1 + Math.random() * 2.5;
          s.style.width = size + 'px';
          s.style.height = size + 'px';
          sf.appendChild(s);
        }
        // ambient sparkles
        for (let i = 0; i < 12; i++) {
          const sp = document.createElement('div');
          sp.className = 'ambient-sparkle';
          sp.style.left = (10 + Math.random() * 80) + '%';
          sp.style.top = (10 + Math.random() * 80) + '%';
          sp.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
          sp.style.animationDelay = (Math.random() * 5) + 's';
          const colours = ['#c8a0ff', '#a0c0ff', '#ffd080', '#80ffc0', '#ff80d0'];
          sp.style.background = colours[Math.floor(Math.random() * colours.length)];
          sp.style.boxShadow = '0 0 6px ' + sp.style.background;
          sf.appendChild(sp);
        }
      }

      /* ─────────────────────────────────────────────
         Potion bubbles
      ───────────────────────────────────────────── */
      let bubbleInterval = null;
      function startBubbles() {
        if (bubbleInterval) clearInterval(bubbleInterval);
        bubbleInterval = setInterval(() => {
          if (isComplete) return;
          const pot = document.getElementById('cauldronPot');
          if (!pot) return;
          const b = document.createElement('div');
          b.className = 'potion-bubble';
          const size = 4 + Math.random() * 10;
          b.style.width = size + 'px';
          b.style.height = size + 'px';
          b.style.left = (20 + Math.random() * 60) + '%';
          b.style.bottom = '30%';
          b.style.setProperty('--dur', (1.2 + Math.random() * 1.5) + 's');
          b.style.setProperty('--delay', '0s');
          const potionColIdx = Math.min(nextLetterIdx, POTION_COLOURS.length - 1);
          const bubbleColours = ['#c080ff', '#80c0ff', '#60e890', '#e0c040', '#ff80d0'];
          b.style.background = bubbleColours[potionColIdx] || '#c080ff';
          b.style.boxShadow = '0 0 4px ' + (bubbleColours[potionColIdx] || '#c080ff');
          pot.appendChild(b);
          setTimeout(() => b.remove(), 3000);
        }, 400);
      }

      /* ─────────────────────────────────────────────
         Set potion colour
      ───────────────────────────────────────────── */
      function updatePotionColour() {
        const surface = document.getElementById('potionSurface');
        const maxSteps = Math.max(currentWord.length, 1);
        const step = Math.min(nextLetterIdx, POTION_COLOURS.length - 1);
        // Interpolate: pick colour based on progress ratio
        const ratio = nextLetterIdx / maxSteps;
        const colIdx = Math.min(
          Math.floor(ratio * (POTION_COLOURS.length - 1) + 0.5),
          POTION_COLOURS.length - 1
        );
        surface.style.background = POTION_COLOURS[colIdx].bg;
        surface.style.setProperty('--potion-glow', POTION_COLOURS[colIdx].glow);
      }

      /* ─────────────────────────────────────────────
         Build game round
      ───────────────────────────────────────────── */
      function buildRound() {
        isComplete = false;
        const data = WORDS[wordIndex];
        currentWord = data.word;
        currentEmoji = data.emoji;
        nextLetterIdx = 0;

        // HUD
        document.getElementById('hudEmoji').textContent = currentEmoji;
        document.getElementById('hudProgress').textContent = 'Spell the word!';
        document.getElementById('hudWordNum').textContent =
          (wordIndex + 1) + ' / ' + WORDS.length;

        // Scroll slots
        const scroll = document.getElementById('spellScroll');
        scroll.innerHTML = '';
        letterSlots = [];
        for (let i = 0; i < currentWord.length; i++) {
          const slot = document.createElement('div');
          slot.className = 'letter-slot';
          slot.dataset.index = i;
          scroll.appendChild(slot);
          letterSlots.push(slot);
        }

        // Potion reset
        updatePotionColour();

        // Build orbs
        buildOrbs();

        // Clear any completion UI
        document.querySelectorAll(
          '.complete-overlay, .materialised, .celebration-text, .next-btn, .eruption-particle'
        ).forEach(el => el.remove());

        startBubbles();
      }

      function buildOrbs() {
        const bank = document.getElementById('orbBank');
        bank.innerHTML = '';

        // Letters needed
        const needed = currentWord.split('');
        // Distractors: random letters not already in the word
        const available = ALPHABET.split('').filter(
          l => !needed.includes(l)
        );
        const distractors = [];
        const shuffled = available.sort(() => Math.random() - 0.5);
        for (let i = 0; i < EXTRA_DISTRACTORS && i < shuffled.length; i++) {
          distractors.push(shuffled[i]);
        }

        // Combine and shuffle
        const allLetters = [...needed, ...distractors].sort(
          () => Math.random() - 0.5
        );

        allLetters.forEach((letter, i) => {
          const orb = document.createElement('div');
          orb.className = 'letter-orb';
          orb.textContent = letter;
          orb.dataset.letter = letter;
          orb.style.setProperty(
            '--float-dur',
            (2.5 + Math.random() * 2) + 's'
          );
          orb.style.setProperty(
            '--float-delay',
            (Math.random() * 2) + 's'
          );
          bank.appendChild(orb);
          setupDrag(orb);
        });
      }

      /* ─────────────────────────────────────────────
         Drag and drop
      ───────────────────────────────────────────── */
      let dragState = null;

      function getPos(e) {
        if (e.touches && e.touches.length > 0) {
          return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
      }

      function setupDrag(orb) {
        const onStart = (e) => {
          if (isComplete) return;
          e.preventDefault();
          const pos = getPos(e);

          // Create ghost
          const ghost = document.createElement('div');
          ghost.className = 'drag-ghost';
          ghost.textContent = orb.textContent;
          ghost.style.left = pos.x + 'px';
          ghost.style.top = pos.y + 'px';
          document.body.appendChild(ghost);

          orb.classList.add('dragging');

          dragState = {
            orb,
            ghost,
            letter: orb.dataset.letter,
          };
        };

        orb.addEventListener('mousedown', onStart);
        orb.addEventListener('touchstart', onStart, { passive: false });
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });

      function onMove(e) {
        if (!dragState) return;
        e.preventDefault();
        const pos = getPos(e);
        dragState.ghost.style.left = pos.x + 'px';
        dragState.ghost.style.top = pos.y + 'px';

        // Check hover over cauldron
        const scene = document.getElementById('cauldronScene');
        const rect = scene.getBoundingClientRect();
        if (
          pos.x >= rect.left &&
          pos.x <= rect.right &&
          pos.y >= rect.top &&
          pos.y <= rect.bottom
        ) {
          scene.classList.add('drop-hover');
        } else {
          scene.classList.remove('drop-hover');
        }
      }

      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
      document.addEventListener('touchcancel', onEnd);

      function onEnd(e) {
        if (!dragState) return;
        const pos = dragState.ghost
          ? {
              x: parseInt(dragState.ghost.style.left),
              y: parseInt(dragState.ghost.style.top),
            }
          : { x: 0, y: 0 };

        const scene = document.getElementById('cauldronScene');
        scene.classList.remove('drop-hover');
        const rect = scene.getBoundingClientRect();

        const droppedOnCauldron =
          pos.x >= rect.left &&
          pos.x <= rect.right &&
          pos.y >= rect.top &&
          pos.y <= rect.bottom;

        if (droppedOnCauldron) {
          const expectedLetter = currentWord[nextLetterIdx];
          if (dragState.letter === expectedLetter) {
            handleCorrectDrop(dragState.orb, pos);
          } else {
            handleWrongDrop(dragState.orb, pos);
          }
        } else {
          // Return orb
          dragState.orb.classList.remove('dragging');
        }

        // Remove ghost
        if (dragState.ghost) dragState.ghost.remove();
        dragState = null;
      }

      /* ─────────────────────────────────────────────
         Correct drop
      ───────────────────────────────────────────── */
      function handleCorrectDrop(orb, pos) {
        orb.classList.add('used');

        // Fill slot
        letterSlots[nextLetterIdx].textContent = currentWord[nextLetterIdx];
        letterSlots[nextLetterIdx].classList.add('filled');
        nextLetterIdx++;

        // Update potion colour
        updatePotionColour();

        // Splash particles
        spawnSplash(pos);

        // Sparkle burst from surface
        spawnSparkles(pos, 10);

        // Update progress
        document.getElementById('hudProgress').textContent =
          nextLetterIdx + ' / ' + currentWord.length;

        // Check completion
        if (nextLetterIdx >= currentWord.length) {
          setTimeout(() => handleWordComplete(), 400);
        }
      }

      function spawnSplash(pos) {
        const scene = document.getElementById('cauldronScene');
        const sceneRect = scene.getBoundingClientRect();
        for (let i = 0; i < 12; i++) {
          const p = document.createElement('div');
          p.className = 'splash-particle';
          const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
          const dist = 20 + Math.random() * 30;
          p.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          p.style.setProperty('--sy', Math.sin(angle) * dist - 20 + 'px');
          p.style.left = (pos.x - sceneRect.left) + 'px';
          p.style.top = (pos.y - sceneRect.top) + 'px';
          const colours = ['#c080ff', '#80c0ff', '#60e890', '#e0c040'];
          p.style.background = colours[Math.floor(Math.random() * colours.length)];
          p.style.boxShadow = '0 0 4px ' + p.style.background;
          scene.appendChild(p);
          setTimeout(() => p.remove(), 700);
        }
      }

      function spawnSparkles(pos, count) {
        const scene = document.getElementById('cauldronScene');
        const sceneRect = scene.getBoundingClientRect();
        for (let i = 0; i < count; i++) {
          const sp = document.createElement('div');
          sp.className = 'sparkle-particle';
          const angle = Math.random() * Math.PI * 2;
          const dist = 30 + Math.random() * 50;
          sp.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          sp.style.setProperty('--sy', Math.sin(angle) * dist - 30 + 'px');
          sp.style.left = (pos.x - sceneRect.left) + 'px';
          sp.style.top = (pos.y - sceneRect.top) + 'px';
          sp.textContent = ['✦', '✧', '⭑', '✶', '·'][Math.floor(Math.random() * 5)];
          sp.style.fontSize = (8 + Math.random() * 14) + 'px';
          const sparkleColours = ['#ffd700', '#ff80d0', '#80ffff', '#c0a0ff', '#ffffff'];
          sp.style.color = sparkleColours[Math.floor(Math.random() * sparkleColours.length)];
          sp.style.textShadow = '0 0 6px ' + sp.style.color;
          scene.appendChild(sp);
          setTimeout(() => sp.remove(), 900);
        }
      }

      /* ─────────────────────────────────────────────
         Wrong drop
      ───────────────────────────────────────────── */
      function handleWrongDrop(orb, pos) {
        orb.classList.remove('dragging');

        // Smoke puffs
        const scene = document.getElementById('cauldronScene');
        const sceneRect = scene.getBoundingClientRect();
        for (let i = 0; i < 6; i++) {
          const sm = document.createElement('div');
          sm.className = 'smoke-puff';
          const angle = Math.random() * Math.PI - Math.PI;
          const dist = 20 + Math.random() * 40;
          sm.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          sm.style.setProperty('--sy', -20 - Math.random() * 50 + 'px');
          sm.style.left = (pos.x - sceneRect.left - 15) + 'px';
          sm.style.top = (pos.y - sceneRect.top - 15) + 'px';
          sm.style.width = (20 + Math.random() * 20) + 'px';
          sm.style.height = sm.style.width;
          const greys = ['#2a1a3a', '#3a2a4a', '#1a0a2a', '#4a3a5a'];
          sm.style.background = greys[Math.floor(Math.random() * greys.length)];
          scene.appendChild(sm);
          setTimeout(() => sm.remove(), 1100);
        }

        // Shake the cauldron briefly
        const cauldron = document.getElementById('cauldron');
        cauldron.style.transition = 'transform 0.1s';
        cauldron.style.transform = 'translateX(-5px)';
        setTimeout(() => {
          cauldron.style.transform = 'translateX(5px)';
          setTimeout(() => {
            cauldron.style.transform = 'translateX(-3px)';
            setTimeout(() => {
              cauldron.style.transform = 'translateX(0)';
            }, 80);
          }, 80);
        }, 80);
      }

      /* ─────────────────────────────────────────────
         Word complete — eruption!
      ───────────────────────────────────────────── */
      function handleWordComplete() {
        isComplete = true;

        // Overlay
        const overlay = document.createElement('div');
        overlay.className = 'complete-overlay';
        document.body.appendChild(overlay);

        // Eruption particles — multiple layers
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight * 0.45;
        spawnEruption(cx, cy, 60);

        // Materialised creature
        setTimeout(() => {
          const creature = document.createElement('div');
          creature.className = 'materialised';
          creature.textContent = currentEmoji;
          document.body.appendChild(creature);
        }, 300);

        // Celebration text
        setTimeout(() => {
          const txt = document.createElement('div');
          txt.className = 'celebration-text';
          txt.textContent = 'Magical! You spelled ' + currentWord.toUpperCase() + '!';
          document.body.appendChild(txt);
        }, 600);

        // Next button
        if (wordIndex < WORDS.length - 1) {
          const btn = document.createElement('button');
          btn.className = 'next-btn';
          btn.textContent = 'Next Spell \u2728';
          btn.addEventListener('click', () => {
            wordIndex++;
            buildRound();
          });
          // also respond to touch
          btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            wordIndex++;
            buildRound();
          });
          document.body.appendChild(btn);
        } else {
          // All words done
          setTimeout(() => {
            const btn = document.createElement('button');
            btn.className = 'next-btn';
            btn.textContent = 'Play Again \u2728';
            btn.addEventListener('click', () => {
              wordIndex = 0;
              buildRound();
            });
            btn.addEventListener('touchend', (e) => {
              e.preventDefault();
              wordIndex = 0;
              buildRound();
            });
            document.body.appendChild(btn);
          }, 200);
        }

        // Second eruption wave
        setTimeout(() => spawnEruption(cx, cy, 40), 500);
        // Third wave
        setTimeout(() => spawnEruption(cx, cy, 30), 900);
      }

      function spawnEruption(cx, cy, count) {
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'eruption-particle';
          const angle = Math.random() * Math.PI * 2;
          const dist = 80 + Math.random() * 250;
          const dur = 0.8 + Math.random() * 1.2;
          p.style.setProperty('--ex', Math.cos(angle) * dist + 'px');
          p.style.setProperty(
            '--ey',
            (Math.sin(angle) * dist - 60 - Math.random() * 100) + 'px'
          );
          p.style.setProperty('--es', (0.1 + Math.random() * 0.4).toString());
          p.style.setProperty('--dur', dur + 's');
          p.style.left = cx + 'px';
          p.style.top = cy + 'px';

          // Mix of sparkle characters and dots
          const isChar = Math.random() > 0.4;
          if (isChar) {
            const chars = ['✦', '✧', '⭑', '✶', '✸', '⬥', '✺'];
            p.textContent = chars[Math.floor(Math.random() * chars.length)];
            p.style.fontSize = (10 + Math.random() * 24) + 'px';
          } else {
            p.style.width = (4 + Math.random() * 8) + 'px';
            p.style.height = p.style.width;
            p.style.borderRadius = '50%';
          }

          const cols = [
            '#ffd700',
            '#ff80d0',
            '#80ffff',
            '#c0a0ff',
            '#ffffff',
            '#ff6060',
            '#60ff90',
            '#ffaa40',
          ];
          const col = cols[Math.floor(Math.random() * cols.length)];
          p.style.color = col;
          p.style.background = isChar ? 'transparent' : col;
          p.style.textShadow = '0 0 8px ' + col;
          p.style.boxShadow = isChar ? 'none' : '0 0 6px ' + col;

          document.body.appendChild(p);
          setTimeout(() => p.remove(), (dur + 0.2) * 1000);
        }
      }

      /* ─────────────────────────────────────────────
         Init
      ───────────────────────────────────────────── */
      buildStarfield();
      buildRound();
    </script>
  </body>
</html>
